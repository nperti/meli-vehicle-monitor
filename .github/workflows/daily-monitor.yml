name: Daily Mercado Libre Vehicle Monitor

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run monitor
        env:
          ML_SITE_ID: ${{ secrets.ML_SITE_ID }}
          ML_ACCESS_TOKEN: ${{ secrets.ML_ACCESS_TOKEN }}
          VEHICLES_JSON: ${{ secrets.VEHICLES_JSON }}
          UPDATE_INTERVAL_HOURS: ${{ secrets.UPDATE_INTERVAL_HOURS }}
          REPORT_INTERVAL_HOURS: ${{ secrets.REPORT_INTERVAL_HOURS }}
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
        run: ml-vehicle-monitor --once
